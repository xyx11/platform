server:
  port: 8082

spring:
  application:
    name: mp-system
  profiles:
    active: dev
  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 465
    username: noreply@example.com
    password: your-auth-code
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        socket:
          factory:
            class: javax.net.ssl.SSLSocketFactory
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
      config:
        enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  jackson:
    type-id-handling: disabled

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.micro.platform.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
  is-print: true
  interceptor:
    enabled: false

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    root: INFO
    com.micro.platform.system: DEBUG
    com.micro.platform.**.mapper: DEBUG
