server:
  port: 8080

spring:
  application:
    name: mp-gateway
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
      config:
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # mp-auth 路由 - Controller: @RequestMapping("/auth")
        - id: mp-auth
          uri: lb://mp-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
        # mp-system 路由 - Controller: @RequestMapping("/system/xxx")
        - id: mp-system
          uri: lb://mp-system
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=0
        # mp-generator 路由 - Controller: @RequestMapping("/generator")
        - id: mp-generator
          uri: lb://mp-generator
          predicates:
            - Path=/generator/**
          filters:
            - StripPrefix=0
        # mp-job 路由 - Controller: @RequestMapping("/job")
        - id: mp-job
          uri: lb://mp-job
          predicates:
            - Path=/job/**
          filters:
            - StripPrefix=0
        # 监控路由 - Controller: @RequestMapping("/monitor")
        - id: mp-system-monitor
          uri: lb://mp-system
          predicates:
            - Path=/monitor/**
          filters:
            - StripPrefix=0
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-print: false

logging:
  level:
    root: INFO
    com.micro.platform.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG